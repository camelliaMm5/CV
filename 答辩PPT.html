<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人群计数方法研究 — 答辩PPT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#0f172a;overflow:hidden;user-select:none}
.slide-container{position:relative;width:100vw;height:100vh}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;opacity:0;transition:opacity .5s,transform .5s;
  transform:translateX(50px);pointer-events:none}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
.slide.prev{opacity:0;transform:translateX(-50px)}

.bar{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;
  padding:28px 60px 20px;flex-shrink:0}
.bar h1{font-size:32px;font-weight:800;letter-spacing:1px;margin:0 0 4px}
.bar .sub{font-size:15px;color:#93c5fd;font-weight:400}
.accent-line{height:4px;background:linear-gradient(90deg,#10b981,#34d399,#10b981);flex-shrink:0}

.body{padding:24px 60px;flex:1;overflow-y:auto;background:#f8fafc;
  display:grid;gap:20px}
.cols2{grid-template-columns:1fr 1fr}
.cols3{grid-template-columns:1fr 1fr 1fr}

.card{background:#fff;border-radius:12px;padding:20px 24px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e2e8f0}
.card h3{font-size:17px;font-weight:700;margin-bottom:10px}
.card.green h3{color:#059669}.card.blue h3{color:#1d4ed8}
.card.red h3{color:#dc2626}.card.orange h3{color:#d97706}
.card p,.card li{font-size:14px;color:#475569;line-height:1.7}
.card ul{padding-left:18px}
.card.green{border-left:4px solid #10b981}
.card.blue{border-left:4px solid #3b82f6}
.card.red{border-left:4px solid #ef4444}
.card.orange{border-left:4px solid #f59e0b}

.page-num{position:absolute;bottom:16px;right:40px;font-size:13px;color:#94a3b8}

.nav{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:12px;align-items:center}
.nav button{width:44px;height:44px;border-radius:50%;border:2px solid #1d4ed8;
  background:#fff;color:#1d4ed8;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.nav button:hover{background:#1d4ed8;color:#fff}
.nav .dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all .3s}
.nav .dot.active{background:#1d4ed8;transform:scale(1.4)}
.nav .page-info{font-size:13px;color:#64748b;min-width:60px;text-align:center}

.title-slide{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1d4ed8 100%);color:#fff;
  justify-content:center;align-items:center;text-align:center}
.title-slide h1{font-size:48px;font-weight:900;margin-bottom:16px;letter-spacing:2px}
.title-slide .tagline{font-size:20px;color:#93c5fd;margin-bottom:40px}
.title-slide .metrics{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
.title-slide .metric-card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);
  border-radius:16px;padding:20px 30px;border:1px solid rgba(255,255,255,.15);min-width:200px}
.title-slide .metric-card .val{font-size:36px;font-weight:900}
.title-slide .metric-card .lbl{font-size:13px;color:#93c5fd;margin-top:4px}

.end-slide{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;
  justify-content:center;align-items:center;text-align:center}

table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#1d4ed8;color:#fff;padding:10px 14px;text-align:left;font-weight:700}
td{padding:9px 14px;border-bottom:1px solid #e2e8f0}
tr:nth-child(even) td{background:#f8fafc}
.highlight td{background:#ecfdf5!important;font-weight:700;color:#059669}

canvas{width:100%;border-radius:8px}

.step-flow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.step-box{background:#fff;border-radius:10px;padding:14px 18px;
  border:2px solid #e2e8f0;text-align:center;min-width:100px;font-size:13px}
.step-box.active{border-color:#10b981;background:#ecfdf5}
.step-arrow{font-size:20px;color:#94a3b8}

.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.tag.green{background:#d1fae5;color:#065f46}
.tag.red{background:#fee2e2;color:#991b1b}
.tag.blue{background:#dbeafe;color:#1e40af}
.tag.orange{background:#fef3c7;color:#92400e}

@media(max-width:900px){
  .bar{padding:20px 24px}.bar h1{font-size:22px}
  .body{padding:16px 24px}.cols2,.cols3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="slide-container" id="slides"></div>

<div class="nav">
  <button onclick="prevSlide()" title="上一页">◀</button>
  <div id="dots"></div>
  <span class="page-info" id="pageInfo">1/16</span>
  <button onclick="nextSlide()" title="下一页">▶</button>
</div>

<script>
// ===================== Training curve data =====================
const v4data = [
  [5,30.49],[10,21.30],[15,18.21],[20,27.37],[25,29.73],
  [30,17.07],[35,16.99],[40,20.21],[45,12.24],[50,14.94],
  [55,14.65],[60,14.31],[65,13.14],[70,13.67],[75,10.73],
  [80,11.71],[85,10.48],[90,10.01],[95,9.95],[100,9.64],
  [105,10.11],[110,9.81],[115,9.78],[120,9.90]
];
const v1data = [[5,37.44],[15,29.78],[25,28.04],[35,24.35],[45,25.95],[50,20.54]];

// ===================== Charts =====================
function drawTrainingCurve(canvasId){
  const c=document.getElementById(canvasId);if(!c)return;
  const w=c.width=c.parentElement.clientWidth-2;
  const h=c.height=380;const ctx=c.getContext('2d');
  const pad={l:70,r:30,t:40,b:50};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const xMin=0,xMax=125,yMin=0,yMax=42;

  function x(e){return pad.l+(e-xMin)/(xMax-xMin)*pw}
  function y(v){return pad.t+ph-(v-yMin)/(yMax-yMin)*ph}

  // Grid
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let i=0;i<=yMax;i+=10){ctx.beginPath();ctx.moveTo(pad.l,y(i));ctx.lineTo(w-pad.r,y(i));ctx.stroke()}

  // Axes
  ctx.strokeStyle='#64748b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();

  // Labels
  ctx.fillStyle='#64748b';ctx.font='12px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  for(let i=0;i<=yMax;i+=10){ctx.fillText(i,pad.l-15,y(i)+4)}
  for(let i=0;i<=xMax;i+=25){ctx.fillText(i,x(i),h-pad.b+20)}
  ctx.fillText('Epoch',w/2,h-8);ctx.save();ctx.translate(15,h/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('Validation MAE',0,0);ctx.restore();

  // Phase divider
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([8,4]);
  ctx.beginPath();ctx.moveTo(x(50),pad.t);ctx.lineTo(x(50),h-pad.b);ctx.stroke();ctx.setLineDash([]);

  // Phase labels
  ctx.fillStyle='#f59e0b';ctx.font='bold 13px "Segoe UI","PingFang SC",sans-serif';
  ctx.fillText('Phase 1: MAE only',x(25),y(4));
  ctx.fillText('Phase 2: MAE+MSE',x(85),y(4));

  // CSRNet baseline
  ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.l,y(11.69));ctx.lineTo(w-pad.r,y(11.69));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ef4444';ctx.font='11px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='right';
  ctx.fillText('CSRNet MAE=11.69',w-pad.r-5,y(11.69)-6);

  // V4 curve
  ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;ctx.beginPath();
  v4data.forEach(([ex,ey],i)=>{const px=x(ex),py=y(ey);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});ctx.stroke();
  v4data.forEach(([ex,ey])=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x(ex),y(ey),5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;ctx.stroke()});

  // Best point
  const bx=x(100),by=y(9.64);
  ctx.fillStyle='#10b981';ctx.beginPath();ctx.arc(bx,by,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx,by,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#10b981';ctx.font='bold 11px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='left';
  ctx.fillText('Best: MAE=9.64 (Epoch 100)',bx+12,by-8);

  ctx.fillStyle='#1e293b';ctx.font='bold 14px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('SwinV2+LoRA v4 Training Curve',w/2,pad.t-15);
}

function drawVersionCompare(canvasId){
  const c=document.getElementById(canvasId);if(!c)return;
  const w=c.width=c.parentElement.clientWidth-2;
  const h=c.height=360;const ctx=c.getContext('2d');
  const pad={l:60,r:20,t:40,b:50};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const xMin=0,xMax=105,yMin=0,yMax=42;

  function x(e){return pad.l+(e-xMin)/(xMax-xMin)*pw}
  function y(v){return pad.t+ph-(v-yMin)/(yMax-yMin)*ph}

  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let i=0;i<=yMax;i+=10){ctx.beginPath();ctx.moveTo(pad.l,y(i));ctx.lineTo(w-pad.r,y(i));ctx.stroke()}
  ctx.strokeStyle='#64748b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
  ctx.fillStyle='#64748b';ctx.font='12px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  for(let i=0;i<=yMax;i+=10){ctx.fillText(i,pad.l-15,y(i)+4)}
  for(let i=0;i<=xMax;i+=25){ctx.fillText(i,x(i),h-pad.b+20)}
  ctx.fillText('Epoch',w/2,h-8);

  ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(pad.l,y(11.69));ctx.lineTo(w-pad.r,y(11.69));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ef4444';ctx.font='10px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='right';
  ctx.fillText('CSRNet 11.69',w-pad.r-5,y(11.69)-6);

  // V1
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=2;ctx.beginPath();
  v1data.forEach(([ex,ey],i)=>{const px=x(ex),py=y(ey);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});ctx.stroke();
  v1data.forEach(([ex,ey])=>{ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.arc(x(ex),y(ey),4,0,Math.PI*2);ctx.fill()});

  // V4
  ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;ctx.beginPath();
  v4data.forEach(([ex,ey],i)=>{const px=x(ex),py=y(ey);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});ctx.stroke();
  v4data.forEach(([ex,ey])=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x(ex),y(ey),4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2;ctx.stroke()});

  // Legend
  ctx.fillStyle='#94a3b8';ctx.fillRect(pad.l+10,pad.t+10,20,12);
  ctx.fillStyle='#1e293b';ctx.font='12px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='left';
  ctx.fillText('v1: LoRA r=16, simple head, all frozen',pad.l+36,pad.t+21);
  ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(pad.l+10,pad.t+35);ctx.lineTo(pad.l+30,pad.t+35);ctx.stroke();
  ctx.fillText('v4: LoRA r=16, light head, shallow freeze + deep SFT',pad.l+36,pad.t+39);

  ctx.fillStyle='#1e293b';ctx.font='bold 14px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('Training Strategy Evolution: v1 → v4',w/2,pad.t-15);
}

function drawBarChart(canvasId){
  const c=document.getElementById(canvasId);if(!c)return;
  const w=c.width=c.parentElement.clientWidth-2;const h=c.height=320;
  const ctx=c.getContext('2d');
  const methods=['SwinV2+LoRA\nv4','CSRNet\n(VGG16)','Weighted\nEnsemble','GBR','RF'];
  const maes=[9.64,11.69,38.73,37.86,40.26];
  const colors=['#1d4ed8','#6366f1','#94a3b8','#cbd5e1','#e2e8f0'];
  const pad={l:50,r:20,t:40,b:70};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const barW=pw/methods.length*0.6, gap=pw/methods.length*0.4;

  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let i=0;i<=45;i+=10){ctx.beginPath();const yy=pad.t+ph-ph*(i/45);ctx.moveTo(pad.l,yy);ctx.lineTo(w-pad.r,yy);ctx.stroke()}
  ctx.fillStyle='#64748b';ctx.font='11px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  for(let i=0;i<=45;i+=10){const yy=pad.t+ph-ph*(i/45);ctx.fillText(i,pad.l-18,yy+4)}

  methods.forEach((m,i)=>{
    const bx=pad.l+i*(barW+gap)+gap/2;
    const bh=ph*(maes[i]/45);
    const by=pad.t+ph-bh;
    ctx.fillStyle=colors[i];ctx.fillRect(bx,by,barW,bh);
    ctx.fillStyle='#1e293b';ctx.font='bold 12px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillText(maes[i].toFixed(2),bx+barW/2,by-6);
    ctx.font='10px "Segoe UI","PingFang SC",sans-serif';
    m.split('\n').forEach((line,j)=>{ctx.fillText(line,bx+barW/2,h-pad.b+15+j*14)});
  });
  ctx.fillStyle='#1e293b';ctx.font='bold 13px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('MAE Comparison (lower is better)',w/2,pad.t-15);
}

function drawEvolutionFlow(canvasId){
  const c=document.getElementById(canvasId);if(!c)return;
  const w=c.width=c.parentElement.clientWidth-2;const h=c.height=300;
  const ctx=c.getContext('2d');

  const versions=[
    {x:w*0.1,y:100,name:'v1\n(初始)',mae:'MAE=20.54',desc:'LoRA r=16\n全冻结\n简单head',color:'#94a3b8',issue:'与CSRNet差距大'},
    {x:w*0.32,y:100,name:'v2/v3\n(失败)',mae:'MAE=113/Loss=3432',desc:'BN+SE+空洞\nr=32,dropout\n差分LR,warmup',color:'#ef4444',issue:'BN小batch不稳定\nLR过高'},
    {x:w*0.58,y:100,name:'v4\n(成功)',mae:'MAE=9.64',desc:'去BN/SE/空洞\n浅冻深解SFT\n分段loss,全层LoRA',color:'#10b981',issue:'超越CSRNet +17.5%'},
  ];

  // Arrows
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=3;
  [0,1].forEach(i=>{
    const x1=versions[i].x+110,x2=versions[i+1].x-50;
    ctx.beginPath();ctx.moveTo(x1,versions[i].y+10);ctx.lineTo(x2,versions[i+1].y+10);
    ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.moveTo(x2,versions[i+1].y+10);
    ctx.lineTo(x2-12,versions[i+1].y+2);ctx.lineTo(x2-12,versions[i+1].y+18);ctx.fill();
  })

  versions.forEach(v=>{
    ctx.fillStyle=v.color+'18';ctx.strokeStyle=v.color;ctx.lineWidth=2.5;
    const rw=140,rh=h-80;
    ctx.beginPath();ctx.roundRect(v.x-5,30,rw,rh-20,12);ctx.fill();ctx.stroke();

    ctx.fillStyle=v.color;ctx.font='bold 16px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
    ctx.fillText(v.name,v.x+65,65);
    ctx.fillStyle='#ef4444';ctx.font='bold 12px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillText(v.mae,v.x+65,90);
    ctx.fillStyle='#475569';ctx.font='11px "Segoe UI","PingFang SC",sans-serif';
    v.desc.split('\n').forEach((l,i)=>{ctx.fillText(l,v.x+65,112+i*17)});
    ctx.fillStyle=v.issue.startsWith('超越')?'#059669':'#dc2626';
    ctx.font='italic 10px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillText(v.issue,v.x+65,rh-10);
  });

  // Feedback labels
  ctx.fillStyle='#f59e0b';ctx.font='italic 11px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('用户反馈: 去掉BN、简化Head、分段loss、浅冻深解',w*0.22,h-12);
  ctx.fillText('用户反馈: SE负收益、FPN太重、关注局部纹理',w*0.48,h-12);

  ctx.fillStyle='#1e293b';ctx.font='bold 14px "Segoe UI","PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('Training Strategy Evolution (v1 → v4)',w/2,20);
}

// ===================== Slide content =====================
const slides=[
// Slide 1: Title
`<div class="slide active title-slide" id="s1">
<h1>基于大模型微调与传统视觉的<br>人群计数方法研究</h1>
<div class="tagline">SwinV2-T + LoRA + SFT &nbsp; vs &nbsp; 手工特征 + 集成回归</div>
<div class="metrics">
<div class="metric-card"><div class="val" style="color:#10b981">9.64</div><div class="lbl">SwinV2+LoRA v4 MAE</div></div>
<div class="metric-card"><div class="val" style="color:#94a3b8">38.73</div><div class="lbl">Traditional CV MAE</div></div>
<div class="metric-card"><div class="val" style="color:#f59e0b">+75.1%</div><div class="lbl">性能提升</div></div>
</div>
<p style="margin-top:40px;color:#93c5fd;font-size:14px">答辩人：camellia &nbsp;|&nbsp; 2026年6月</p>
</div>`,

// Slide 2: Background
`<div class="slide" id="s2">
<div class="bar"><h1>研究背景与问题定义</h1><div class="sub">Crowd Counting: Problem Definition & Challenges</div></div>
<div class="accent-line"></div>
<div class="body cols2">
<div>
<div class="card blue"><h3>任务定义</h3><p>给定RGB人群图像 → 预测人数 + 输出密度分布图</p></div>
<div class="card blue" style="margin-top:16px"><h3>研究方法</h3>
<p><span class="tag green">70%篇幅</span> <b>SwinV2-T大模型</b> + LoRA微调 + SFT解冻 → 密度图回归</p>
<p style="margin-top:8px"><span class="tag blue">30%篇幅</span> 384维手工特征 + GBR/RF加权集成回归</p>
</div>
</div>
<div class="card red"><h3>五大核心挑战</h3>
<ul><li><b>遮挡与重叠</b> — 密集人群相互遮挡，难以分离</li>
<li><b>尺度剧变</b> — 近处数十像素 vs 远处几像素 (10x差异)</li>

</div>
</div>
<p class="page-num">2 / 16</p>
</div>`,

// Slide 3: Technical Route
`<div class="slide" id="s3">
<div class="bar"><h1>整体技术路线</h1><div class="sub">Overall Technical Pipeline</div></div>
<div class="accent-line"></div>
<div class="body cols2">
<div>
<div class="card green"><h3>方法一：SwinV2+LoRA v4 (深度学习)</h3>
<div class="step-flow" style="flex-direction:column;align-items:stretch;gap:8px;margin-top:8px">
<div class="step-box active">① CLAHE光照归一化</div>
<div class="step-box active">② SwinV2-T Backbone<br><small style="color:#64748b">浅层冻结+LoRA | 深层解冻SFT</small></div>
<div class="step-box active">③ LightCountingHead → 密度图<br><small style="color:#64748b">H/8 × W/8 分辨率</small></div>
<div class="step-box active">④ ∫密度图 = 预测人数</div>
</div>
</div>
<div class="card blue"><h3>方法二：传统CV (手工特征+集成回归)</h3>

// Slide 7: Loss Function
`<div class="slide" id="s7">
<div class="bar"><h1>损失函数设计：分段多分辨率优化</h1><div class="sub">Loss Function: Staged Multi-Resolution Optimization</div></div>
<div class="accent-line"></div>
<div class="body cols2">
<div>
<div class="card blue"><h3>密度损失：多分辨率 SmoothL1</h3>
<pre style="font-size:13px;background:#f1f5f9;padding:12px;border-radius:8px;line-height:1.8">
L_density = 1.0 × SmoothL1(full_res, gt)
          + 0.1 × SmoothL1(half_res, gt_pooled)

<b>权重分配逻辑：</b>
• Full-res占主导(1.0)：保留局部纹理和头部细节
• Half-res辅助(0.1)：粗粒度正则化，防过拟合
• SmoothL1而非MSE：对密度图峰值outlier更鲁棒</pre>
</div>
</div>
<div>
<div class="card green"><h3>Phase 1 (Epoch 1-50)：MAE Only</h3>
<pre style="font-size:13px;background:#f1f5f9;padding:12px;border-radius:8px;line-height:1.8">
L = L_density + 2.0 × |∑pred - count_gt|

目的：梯度稳定，先学会基础密度估计和计数
避免：初期MSE导致loss数值巨大(3000+)→发散</pre>
</div>
<div class="card orange" style="margin-top:16px"><h3>Phase 2 (Epoch 51-120)：MAE + MSE</h3>
<pre style="font-size:13px;background:#f1f5f9;padding:12px;border-radius:8px;line-height:1.8">
L = L_density + 2.0×|∑pred - count_gt|
              + 0.5×(∑pred - count_gt)²

目的：基础计数建立后，MSE重罚大误差
效果：大偏差(30→100)惩罚是小偏差(50→55)的4倍</pre>
</div>
</div>
</div>
<div class="card" style="margin:0 60px 24px"><h3>实验验证：为什么分段？</h3>

// Slide 8: LoRA + SFT
`<div class="slide" id="s8">
<div class="bar"><h1>LoRA优化与SFT策略</h1><div class="sub">LoRA Deployment & SFT Freeze Strategy</div></div>
<div class="accent-line"></div>
<div class="body cols2">
<div>
<div class="card blue"><h3>LoRA原理与挂载方案</h3>
<pre style="font-size:13px;background:#f1f5f9;padding:12px;border-radius:8px;line-height:1.8">
y = Wx + (α/r)·BAx
  W: frozen (原始权重)
  A: r×in (可训练)  B: out×r (可训练)
  r=16, α=16, scaling=α/r=1.0

<b>全层挂载 (用户反馈驱动)：</b>
每个Swin Block中：
  ▸ self_attn.qkv   (注意力QKV投影)
  ▸ self_attn.proj  (注意力输出投影)
  ▸ mlp.fc1         (MLP第一层)
  ▸ mlp.fc2         (MLP第二层)
共 24层attention + 24层MLP = 48个LoRA模块</pre>
</div>
<div class="card green" style="margin-top:12px"><h3>实现关键</h3>
<p>Swin内部使用 <code>F.linear(x, self.qkv.weight)</code> 而非 <code>self.qkv(x)</code></p>
<p><b>解决方案：</b>@property weight 动态计算 W + (α/r)·BA → 透明集成，无需修改Swin源码</p>
</div>
</div>
<div>
<div class="card"><h3>冻结策略：浅层冻结 + 深层SFT</h3>

// ===================== Render slides =====================
const container = document.getElementById('slides');
let current = 0;

function renderAll(){
  container.innerHTML = slides.join('');
  // Draw charts
  setTimeout(()=>{
    drawTrainingCurve('trainingCurve');
    drawVersionCompare('versionCompare');
    drawBarChart('barChart');
    drawEvolutionFlow('evolutionFlow');
  },100);
}
renderAll();

function showSlide(n){
  document.querySelectorAll('.slide').forEach((s,i)=>{
    s.classList.remove('active','prev');
    if(i===n) s.classList.add('active');
    else if(i<n) s.classList.add('prev');
  });
  document.querySelectorAll('.nav .dot').forEach((d,i)=>d.classList.toggle('active',i===n));
  document.getElementById('pageInfo').textContent = `${n+1}/${slides.length}`;
  current=n;
}

// Navigation dots
const dotsDiv = document.getElementById('dots');
slides.forEach((_,i)=>{
  const dot = document.createElement('span');
  dot.className = 'dot' + (i===0?' active':'');
  dot.onclick = ()=>showSlide(i);
  dotsDiv.appendChild(dot);
});

function nextSlide(){ if(current<slides.length-1) showSlide(current+1); }
function prevSlide(){ if(current>0) showSlide(current-1); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') {e.preventDefault();nextSlide();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') {e.preventDefault();prevSlide();}
});

// Touch support
let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX});
document.addEventListener('touchend',e=>{
  const diff = touchX - e.changedTouches[0].clientX;
  if(Math.abs(diff)>50){ diff>0?nextSlide():prevSlide(); }
});

// Initial
showSlide(0);
</script>
